<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - SereNya.pk</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2d2d2d;
      --accent-color: #e6d7ff;
      --lilac-light: #f8f5ff;
      --lilac-subtle: #e6d7ff;
      --neutral-light: #ffffff;
      --neutral-dark: #2d2d2d;
      --background: #ffffff;
      --card-bg: #fafafa;
      --text-dark: #2d2d2d;
      --text-light: #666666;
      --serenya-pink: #b19cd9;
    }

    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-inter { font-family: 'Inter', sans-serif; }

    body {
      background: linear-gradient(135deg, var(--lilac-light) 0%, #ffffff 50%, var(--lilac-subtle) 100%);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative background elements inspired by reference */
    .bg-decoration {
      position: absolute;
      border-radius: 50%;
      background: var(--lilac-subtle);
      opacity: 0.3;
      z-index: 0;
    }

    .bg-decoration:nth-child(1) {
      width: 200px;
      height: 200px;
      top: 10%;
      left: -50px;
    }

    .bg-decoration:nth-child(2) {
      width: 150px;
      height: 150px;
      top: 60%;
      right: -30px;
      background: var(--serenya-pink);
      opacity: 0.2;
    }

    .bg-decoration:nth-child(3) {
      width: 100px;
      height: 100px;
      bottom: 20%;
      left: 15%;
      background: var(--accent-color);
      opacity: 0.4;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    .back-button {
      position: absolute;
      top: 2rem;
      left: 2rem;
      background: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      z-index: 10;
    }

    .back-button:hover {
      transform: translateX(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .back-button i {
      font-size: 1.2rem;
      color: var(--text-dark);
    }

    .brand-badge {
      position: absolute;
      top: 2rem;
      right: 2rem;
      background: white;
      border: 2px solid var(--serenya-pink);
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: var(--text-dark);
      font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(177, 156, 217, 0.2);
      z-index: 10;
    }

    .login-card {
      background: white;
      border-radius: 25px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 2;
    }

    .welcome-section {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .welcome-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .brand-highlight {
      color: var(--serenya-pink);
    }

    .welcome-subtitle {
      color: var(--text-light);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .auth-tabs {
      display: flex;
      background: var(--lilac-light);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
      position: relative;
    }

    .tab-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: white;
      border-radius: 8px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .tab-slider.signup {
      transform: translateX(100%);
    }

    .auth-tab {
      flex: 1;
      padding: 12px 20px;
      text-align: center;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: color 0.3s ease;
      position: relative;
      z-index: 2;
      border: none;
      background: none;
      font-size: 0.95rem;
    }

    .auth-tab.active {
      color: var(--text-dark);
    }

    .form-container {
      position: relative;
      overflow: hidden;
    }

    .form-wrapper {
      display: flex;
      width: 200%;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-wrapper.signup {
      transform: translateX(-50%);
    }

    .auth-form {
      width: 50%;
      padding-right: 1rem;
      box-sizing: border-box;
    }

    .auth-form.signup-form {
      padding-right: 0;
      padding-left: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: var(--lilac-light);
      box-sizing: border-box;
      color: var(--text-dark);
    }

    .form-input::placeholder {
      color: var(--text-light);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--serenya-pink);
      background: white;
      box-shadow: 0 0 0 3px rgba(177, 156, 217, 0.1);
    }

    .password-container {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: var(--text-dark);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-dark);
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--serenya-pink);
    }

    .forgot-link {
      color: var(--serenya-pink);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-link:hover {
      color: var(--text-dark);
    }

    .submit-button {
      width: 100%;
      background: var(--serenya-pink);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1.5rem;
    }

    .submit-button:hover {
      background: #9d7cc7;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(177, 156, 217, 0.4);
    }

    .submit-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .login-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
      }

      .welcome-title {
        font-size: 1.8rem;
      }

      .back-button, .brand-badge {
        position: fixed;
      }

      .brand-badge {
        width: 60px;
        height: 60px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-decoration"></div>
  <div class="bg-decoration"></div>
  <div class="bg-decoration"></div>

  <button class="back-button" onclick="window.location.href='homepage.html'">
    <i class="fas fa-arrow-left"></i>
  </button>

  <div class="brand-badge">
    SereNya
  </div>

  <div class="container">
    <div class="login-card">
      <div class="welcome-section">
        <h1 class="welcome-title">Welcome to <span class="brand-highlight">SereNya</span></h1>
        <p class="welcome-subtitle">Log in to your handcrafted world</p>
        
        <div class="auth-tabs">
          <div class="tab-slider" id="tabSlider"></div>
          <button class="auth-tab active" id="loginTab" onclick="switchToLogin()">Log In</button>
          <button class="auth-tab" id="signupTab" onclick="switchToSignup()">Sign Up</button>
        </div>
      </div>

      <div class="form-container">
        <div class="form-wrapper" id="formWrapper">
          <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label" for="loginEmail">Email Address</label>
              <input type="email" class="form-input" id="loginEmail" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="loginPassword">Password</label>
              <div class="password-container">
                <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe">
                Remember me
              </label>
              <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
            </div>
            
            <button type="submit" class="submit-button">Log In</button>
          </form>

          <form class="auth-form signup-form" id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
              <label class="form-label" for="signupName">Full Name</label>
              <input type="text" class="form-input" id="signupName" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="signupEmail">Email Address</label>
              <input type="email" class="form-input" id="signupEmail" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="signupPassword">Password</label>
              <div class="password-container">
                <input type="password" class="form-input" id="signupPassword" placeholder="Create a password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="confirmPassword">Confirm Password</label>
              <div class="password-container">
                <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <button type="submit" class="submit-button">Sign Up</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    function switchToLogin() {
      const loginTab = document.getElementById('loginTab');
      const signupTab = document.getElementById('signupTab');
      const tabSlider = document.getElementById('tabSlider');
      const formWrapper = document.getElementById('formWrapper');
      
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      tabSlider.classList.remove('signup');
      formWrapper.classList.remove('signup');
    }

    function switchToSignup() {
      const loginTab = document.getElementById('loginTab');
      const signupTab = document.getElementById('signupTab');
      const tabSlider = document.getElementById('tabSlider');
      const formWrapper = document.getElementById('formWrapper');
      
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      tabSlider.classList.add('signup');
      formWrapper.classList.add('signup');
    }

    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector('i');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const button = event.target.querySelector('.submit-button');
      
      if (!email || !password) {
        alert('Please fill in all fields');
        return;
      }
      
      const originalText = button.textContent;
      button.textContent = 'Logging In...';
      button.disabled = true;
      
      setTimeout(() => {
        button.textContent = 'Welcome Back!';
        button.style.background = '#2ed573';
        
        setTimeout(() => {
          window.location.href = 'homepage.html';
        }, 1500);
      }, 1000);
    }

    function handleSignup(event) {
      event.preventDefault();
      
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const button = event.target.querySelector('.submit-button');
      
      if (!name || !email || !password || !confirmPassword) {
        alert('Please fill in all fields');
        return;
      }
      
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }
      
      if (password.length < 6) {
        alert('Password must be at least 6 characters long');
        return;
      }
      
      const originalText = button.textContent;
      button.textContent = 'Creating Account...';
      button.disabled = true;
      
      setTimeout(() => {
        button.textContent = 'Account Created!';
        button.style.background = '#2ed573';
        
        setTimeout(() => {
          window.location.href = 'homepage.html';
        }, 1500);
      }, 1000);
    }

    function forgotPassword() {
      alert('Password reset functionality would be implemented here');
    }
  </script>
</body>
</html>
